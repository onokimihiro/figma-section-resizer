<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Section Resizer</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --surface: #f5f5f5;
    --surface2: #ebebeb;
    --border: #d0d0d0;
    --accent: #7b61ff;
    --accent-hover: #6a50ee;
    --accent-glow: rgba(123, 97, 255, 0.2);
    --text: #1a1a1f;
    --text-muted: #666680;
    --success: #16a34a;
    --error: #dc2626;
    --radius: 8px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    line-height: 1.5;
    padding: 16px;
    user-select: none;
    min-height: unset;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }

  .header-icon {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .header-icon svg { display: block; }

  .header h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .header p {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── Padding Grid ── */
  .padding-section {
    margin-bottom: 16px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  /* Visual box layout */
  .padding-grid {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    grid-template-rows: auto auto auto;
    gap: 6px;
    align-items: center;
    justify-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
  }

  .pad-top    { grid-column: 2; grid-row: 1; }
  .pad-left   { grid-column: 1; grid-row: 2; }
  .pad-center { grid-column: 2; grid-row: 2; }
  .pad-right  { grid-column: 3; grid-row: 2; }
  .pad-bottom { grid-column: 2; grid-row: 3; }

  /* Input fields */
  .pad-input-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .pad-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
  }

  .pad-input {
    width: 58px;
    height: 30px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  /* Chrome, Safari, Edge */
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  /* Firefox */
  input[type="number"] {
    -moz-appearance: textfield;
  }

  .pad-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }

  .pad-input.linked {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent-glow);
  }

  /* Center section */
  .pad-center-box {
    width: 72px;
    height: 44px;
    background: var(--surface2);
    border: 1px dashed var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Link toggle button */
  .link-btn {
    width: 26px;
    height: 26px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s, color 0.15s;
    flex-shrink: 0;
    color: var(--text-muted);
  }

  .link-btn:hover {
    background: var(--surface);
    border-color: var(--accent);
  }

  .link-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    color: #fff;
  }

  .link-btn svg { display: block; transition: opacity 0.15s; }

  /* ── Presets ── */
  .preset-section {
    margin-bottom: 16px;
  }

  .preset-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
  }

  .preset-btn {
    height: 28px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--font);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, color 0.12s, box-shadow 0.12s;
    white-space: nowrap;
    padding: 0 4px;
  }

  .preset-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px var(--accent-glow);
  }

  .preset-btn:active {
    transform: scale(0.96);
  }

  /* ── Color Presets ── */
  .color-section {
    margin-bottom: 16px;
  }

  .color-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
  }

  .color-btn {
    height: 28px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--font);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.12s, box-shadow 0.12s;
    display: flex;
    align-items: center;
    gap: 4px;
    justify-content: center;
    padding: 0 4px;
  }

  .color-btn:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent-glow);
  }

  .color-btn.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }

  .color-swatch {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .color-custom {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
  }

  .hex-input-wrap {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 8px;
    height: 30px;
    flex: 1;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .hex-input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }

  .hex-prefix {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    pointer-events: none;
  }

  .hex-input {
    width: 100%;
    border: none;
    background: transparent;
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    outline: none;
    text-transform: uppercase;
  }

  .hex-preview {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ── Action Buttons ── */
  .btn-row {
    display: flex;
    gap: 8px;
  }

  .resize-btn,
  .create-btn {
    flex: 1;
    height: 36px;
    border-radius: var(--radius);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s, transform 0.1s, opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .resize-btn {
    background: var(--accent);
    color: #fff;
    border: none;
  }

  .resize-btn:hover:not(:disabled) {
    background: var(--accent-hover);
    box-shadow: 0 4px 16px var(--accent-glow);
  }

  .resize-btn:active:not(:disabled) {
    transform: scale(0.98);
  }

  .resize-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .create-btn {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .create-btn:hover {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent);
  }

  .create-btn:active {
    transform: scale(0.98);
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-icon">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <rect x="2" y="2" width="12" height="12" rx="2" stroke="white" stroke-width="1.5" fill="none"/>
      <path d="M5 8h6M8 5v6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
  <div>
    <h1>Section Resizer</h1>
    <p id="header-desc">パディングを指定してセクションをリサイズ</p>
  </div>
</div>

<!-- Padding inputs -->
<div class="padding-section">
  <div class="section-label" id="section-label">パディング (px)</div>

  <div class="padding-grid">

    <!-- Top -->
    <div class="pad-top">
      <div class="pad-input-wrap">
        <span class="pad-label" id="label-top">上</span>
        <input class="pad-input" id="pad-top" type="number" value="80" min="0" />
      </div>
    </div>

    <!-- Left -->
    <div class="pad-left">
      <div class="pad-input-wrap">
        <span class="pad-label" id="label-left">左</span>
        <input class="pad-input" id="pad-left" type="number" value="80" min="0" />
      </div>
    </div>

    <!-- Center: link button -->
    <div class="pad-center" style="display:flex; align-items:center; padding-top:12px;">
        <button class="link-btn active" id="link-btn" title="上下左右を連動">
          <!-- Linked icon -->
          <svg id="icon-linked" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          <!-- Unlinked icon -->
          <svg id="icon-unlinked" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <path d="m18.84 12.25 1.72-1.71h-.02a5.004 5.004 0 0 0-.12-7.07 5.006 5.006 0 0 0-6.95 0l-1.72 1.71"/>
            <path d="m5.17 11.75-1.71 1.71a5.004 5.004 0 0 0 .12 7.07 5.006 5.006 0 0 0 6.95 0l1.71-1.71"/>
            <line x1="8" x2="8" y1="2" y2="5"/>
            <line x1="2" x2="5" y1="8" y2="8"/>
            <line x1="16" x2="16" y1="19" y2="22"/>
            <line x1="19" x2="22" y1="16" y2="16"/>
          </svg>
        </button>
    </div>

    <!-- Right -->
    <div class="pad-right">
      <div class="pad-input-wrap">
        <span class="pad-label" id="label-right">右</span>
        <input class="pad-input" id="pad-right" type="number" value="80" min="0" />
      </div>
    </div>

    <!-- Bottom -->
    <div class="pad-bottom">
      <div class="pad-input-wrap">
        <span class="pad-label" id="label-bottom">下</span>
        <input class="pad-input" id="pad-bottom" type="number" value="80" min="0" />
      </div>
    </div>

  </div>
</div>

<!-- Presets -->
<div class="preset-section">
  <div class="section-label" id="label-presets">プリセット</div>
  <div class="preset-grid">
    <button class="preset-btn" data-value="40">40</button>
    <button class="preset-btn" data-value="80">80</button>
    <button class="preset-btn" data-value="100">100</button>
    <button class="preset-btn" data-value="120">120</button>
    <button class="preset-btn" data-value="160">160</button>
    <button class="preset-btn" data-value="200">200</button>
    <button class="preset-btn" data-value="240">240</button>
    <button class="preset-btn" data-value="320">320</button>
    <button class="preset-btn" data-value="400">400</button>
  </div>
</div>

<!-- Section color -->
<div class="color-section">
  <div class="section-label" id="label-color">セクション背景色</div>
  <div class="color-custom">
    <span class="hex-preview" id="hex-preview" style="background:rgba(203,213,225,0.8)"></span>
    <div class="hex-input-wrap">
      <span class="hex-prefix">#</span>
      <input class="hex-input" id="hex-input" type="text" value="CBD5E1" maxlength="6" placeholder="CBD5E1" />
    </div>
  </div>
  <div class="color-grid" style="margin-top:8px;">
    <button class="color-btn active" data-opacity="0.8">
      <span class="color-swatch" style="background:rgba(203,213,225,0.8)"></span>80%
    </button>
    <button class="color-btn" data-opacity="0.5">
      <span class="color-swatch" style="background:rgba(203,213,225,0.5)"></span>50%
    </button>
    <button class="color-btn" data-opacity="0.3">
      <span class="color-swatch" style="background:rgba(203,213,225,0.3)"></span>30%
    </button>
    <button class="color-btn" data-opacity="0.1">
      <span class="color-swatch" style="background:rgba(203,213,225,0.1)"></span>10%
    </button>
  </div>
</div>

<!-- Action buttons -->
<div class="btn-row">
  <button class="resize-btn" id="resize-btn" disabled>
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M2 7h10M9 4l3 3-3 3" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span id="btn-resize-label">リサイズ</span>
  </button>
  <button class="create-btn" id="create-btn">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <rect x="1.5" y="1.5" width="11" height="11" rx="1.5" stroke="currentColor" stroke-width="1.4" fill="none"/>
      <path d="M7 4.5v5M4.5 7h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <span id="btn-create-label">セクション作成</span>
  </button>
</div>

<script>
  // ── i18n ──
  const isJa = navigator.language.startsWith('ja');
  const t = {
    desc:          isJa ? 'パディングを指定してセクションをリサイズ' : 'Resize sections with custom padding',
    section:       isJa ? 'パディング (px)' : 'PADDING (px)',
    presets:       isJa ? 'プリセット' : 'PRESETS',
    top:           isJa ? '上' : 'T',
    right:         isJa ? '右' : 'R',
    bottom:        isJa ? '下' : 'B',
    left:          isJa ? '左' : 'L',
    linkTitle:     isJa ? '上下左右を連動' : 'Link all sides',
    resize:        isJa ? 'リサイズ' : 'Resize',
    createSection: isJa ? 'セクション作成' : 'Create Section',
    color:         isJa ? 'セクション背景色' : 'SECTION COLOR',
  };
  document.getElementById('header-desc').textContent = t.desc;
  document.getElementById('label-presets').textContent = t.presets;
  document.getElementById('section-label').textContent = t.section;
  document.getElementById('label-top').textContent = t.top;
  document.getElementById('label-right').textContent = t.right;
  document.getElementById('label-bottom').textContent = t.bottom;
  document.getElementById('label-left').textContent = t.left;
  document.getElementById('link-btn').title = t.linkTitle;
  document.getElementById('btn-resize-label').textContent = t.resize;
  document.getElementById('btn-create-label').textContent = t.createSection;
  document.getElementById('label-color').textContent = t.color;
  document.documentElement.lang = isJa ? 'ja' : 'en';

  // Send locale to plugin backend
  parent.postMessage({ pluginMessage: { type: 'set-locale', isJa } }, '*');

  const inputs = {
    top:    document.getElementById('pad-top'),
    right:  document.getElementById('pad-right'),
    bottom: document.getElementById('pad-bottom'),
    left:   document.getElementById('pad-left'),
  };
  const linkBtn       = document.getElementById('link-btn');
  const iconLinked    = document.getElementById('icon-linked');
  const iconUnlinked  = document.getElementById('icon-unlinked');
  const resizeBtn     = document.getElementById('resize-btn');
  const createBtn     = document.getElementById('create-btn');

  let linked = true;
  let hasSection = false;

  // ── Receive messages from backend ──
  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;
    if (msg.type === 'selection-update') {
      hasSection = msg.hasSection;
      resizeBtn.disabled = !hasSection;
    }
  };

  // ── Link toggle ──
  linkBtn.addEventListener('click', () => {
    linked = !linked;
    linkBtn.classList.toggle('active', linked);
    iconLinked.style.display   = linked ? 'block' : 'none';
    iconUnlinked.style.display = linked ? 'none'  : 'block';

    // Sync all to top value when re-linking
    if (linked) {
      const val = inputs.top.value;
      Object.values(inputs).forEach(el => {
        el.value = val;
        el.classList.add('linked');
      });
    } else {
      Object.values(inputs).forEach(el => el.classList.remove('linked'));
    }
  });

  // Mark all as linked initially
  Object.values(inputs).forEach(el => el.classList.add('linked'));

  // ── Sync inputs when linked ──
  Object.entries(inputs).forEach(([key, el]) => {
    el.addEventListener('input', () => {
      if (!linked) return;
      const val = el.value;
      Object.values(inputs).forEach(other => { other.value = val; });
    });
  });

  // ── Color selection ──
  const hexInput = document.getElementById('hex-input');
  const hexPreview = document.getElementById('hex-preview');

  function parseHex(hex) {
    hex = hex.replace(/[^0-9a-fA-F]/g, '');
    if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    if (hex.length !== 6) return null;
    return {
      r: parseInt(hex.substring(0, 2), 16) / 255,
      g: parseInt(hex.substring(2, 4), 16) / 255,
      b: parseInt(hex.substring(4, 6), 16) / 255,
    };
  }

  function getSelectedColor() {
    const activeBtn = document.querySelector('.color-btn.active');
    const opacity = activeBtn ? parseFloat(activeBtn.dataset.opacity) : 0.8;
    const hex = parseHex(hexInput.value);
    const c = hex || { r: 203/255, g: 213/255, b: 225/255 };
    return { r: c.r, g: c.g, b: c.b, a: opacity };
  }

  function updatePreview() {
    const c = getSelectedColor();
    const r8 = Math.round(c.r * 255);
    const g8 = Math.round(c.g * 255);
    const b8 = Math.round(c.b * 255);
    hexPreview.style.background = `rgba(${r8},${g8},${b8},${c.a})`;
  }

  hexInput.addEventListener('input', updatePreview);

  document.querySelectorAll('.color-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updatePreview();
    });
  });

  // ── Helper ──
  const getPadding = () => {
    const getValue = (el) => {
      const v = parseInt(el.value, 10);
      return isNaN(v) || v < 0 ? 0 : v;
    };
    return {
      top:    getValue(inputs.top),
      right:  getValue(inputs.right),
      bottom: getValue(inputs.bottom),
      left:   getValue(inputs.left),
    };
  };

  // ── Preset buttons ──
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.value;
      Object.values(inputs).forEach(el => { el.value = val; });
      if (!linked) {
        linked = true;
        linkBtn.classList.add('active');
        iconLinked.style.display = 'block';
        iconUnlinked.style.display = 'none';
        Object.values(inputs).forEach(el => el.classList.add('linked'));
      }
      const type = hasSection ? 'resize' : 'create-section';
      parent.postMessage({ pluginMessage: { type, ...getPadding(), fillColor: getSelectedColor() } }, '*');
    });
  });

  // ── Resize button ──
  resizeBtn.addEventListener('click', () => {
    parent.postMessage({ pluginMessage: { type: 'resize', ...getPadding(), fillColor: getSelectedColor() } }, '*');
  });

  // ── Create Section button ──
  createBtn.addEventListener('click', () => {
    parent.postMessage({ pluginMessage: { type: 'create-section', ...getPadding(), fillColor: getSelectedColor() } }, '*');
  });

</script>
</body>
</html>
